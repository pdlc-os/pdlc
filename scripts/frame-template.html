<!DOCTYPE html>
<html data-theme="light">
<head>
  <meta charset="utf-8">
  <title>PDLC Visual Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    /*
     * PDLC VISUAL COMPANION — Flexy Admin Design System
     *
     * Based on WrapPixel Flexy-admin-Nextjs-Free theme:
     * - DM Sans font family + Material Icons
     * - Flexy elevation (soft box-shadows)
     * - Flexy color palette with light/dark themes
     * - Ripple effects on interactive elements
     * - Light/dark toggle with smooth transitions
     * - 20px card radius, 7px button/input radius
     *
     * Structural contracts preserved:
     * - #claude-content: content fragment injection point
     * - .indicator-bar: selection feedback
     * - .option/.card with toggleSelect() and .selected state
     * - data-choice attributes for event recording
     */

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ===== THEME VARIABLES ===== */
    :root {
      --theme-transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* --- Light Theme (default — Flexy palette) --- */
    [data-theme="light"] {
      --md-surface: #fafbfb;
      --md-surface-1: #ffffff;
      --md-surface-2: #ffffff;
      --md-surface-3: #f6f9fc;
      --md-surface-4: #ecf0f2;
      --md-surface-6: #EAEFF4;
      --md-surface-8: #DFE5EF;
      --md-surface-12: #e5eaef;
      --md-on-surface: #11142d;
      --md-on-surface-medium: #5A6A85;
      --md-on-surface-disabled: #767e89;
      --md-primary: #1e4db7;
      --md-primary-light: #e7ecf7;
      --md-primary-variant: #173f98;
      --md-on-primary: #ffffff;
      --md-secondary: #1a97f5;
      --md-secondary-light: #EFF9FF;
      --md-secondary-variant: #1682d4;
      --md-on-secondary: #ffffff;
      --md-error: #fc4b6c;
      --md-error-light: #fdf3f5;
      --md-on-error: #ffffff;
      --md-success: #00c292;
      --md-success-light: #ebfaf2;
      --md-warning: #fdc90f;
      --md-warning-light: #fff4e5;
      --md-info: #0bb2fb;
      --md-info-light: #dff8ff;
      --md-outline: #e5eaef;
      --md-divider: #e9e9e9;
      --md-hover: #f6f9fc;
      --md-selected: rgba(30, 77, 183, 0.08);
      --md-selected-border: var(--md-primary);
      --md-ripple: rgba(0, 0, 0, 0.06);
      --md-header-bg: #ffffff;
      --md-elevation-1: 0px 7px 30px 0px rgba(90, 114, 123, 0.11);
      --md-elevation-2: 0px 7px 30px 0px rgba(90, 114, 123, 0.11);
      --md-elevation-4: 0px 10px 35px 0px rgba(90, 114, 123, 0.15);
      --md-elevation-8: 0px 12px 40px 0px rgba(90, 114, 123, 0.20);
    }

    /* --- Dark Theme (Flexy-inspired dark complement) --- */
    [data-theme="dark"] {
      --md-surface: #0f1724;
      --md-surface-1: #162033;
      --md-surface-2: #1a2540;
      --md-surface-3: #1e2a48;
      --md-surface-4: #223050;
      --md-surface-6: #283856;
      --md-surface-8: #2e3f5e;
      --md-surface-12: #384a6b;
      --md-on-surface: #e4e7eb;
      --md-on-surface-medium: #9ca8bc;
      --md-on-surface-disabled: #6b7a92;
      --md-primary: #5b8def;
      --md-primary-light: rgba(91, 141, 239, 0.12);
      --md-primary-variant: #1e4db7;
      --md-on-primary: #ffffff;
      --md-secondary: #4db5f9;
      --md-secondary-light: rgba(77, 181, 249, 0.10);
      --md-secondary-variant: #1a97f5;
      --md-on-secondary: #0f1724;
      --md-error: #fd7b93;
      --md-error-light: rgba(253, 123, 147, 0.10);
      --md-on-error: #0f1724;
      --md-success: #33d4ac;
      --md-success-light: rgba(51, 212, 172, 0.10);
      --md-warning: #fdd64b;
      --md-warning-light: rgba(253, 214, 75, 0.10);
      --md-info: #3dc1fc;
      --md-info-light: rgba(61, 193, 252, 0.10);
      --md-outline: #2e3f5e;
      --md-divider: rgba(255, 255, 255, 0.08);
      --md-hover: rgba(255, 255, 255, 0.04);
      --md-selected: rgba(91, 141, 239, 0.15);
      --md-selected-border: var(--md-primary);
      --md-ripple: rgba(255, 255, 255, 0.08);
      --md-header-bg: #0d1420;
      --md-elevation-1: 0px 4px 20px 0px rgba(0, 0, 0, 0.30);
      --md-elevation-2: 0px 7px 30px 0px rgba(0, 0, 0, 0.35);
      --md-elevation-4: 0px 10px 35px 0px rgba(0, 0, 0, 0.40);
      --md-elevation-8: 0px 12px 40px 0px rgba(0, 0, 0, 0.50);
    }

    /* ===== BASE ===== */
    body {
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      background: var(--md-surface);
      color: var(--md-on-surface);
      display: flex;
      flex-direction: column;
      line-height: 1.5;
      letter-spacing: 0.01em;
      transition: var(--theme-transition);
      -webkit-font-smoothing: antialiased;
    }

    /* ===== ELEVATION HELPERS ===== */
    .elevation-1 { box-shadow: var(--md-elevation-1); }
    .elevation-2 { box-shadow: var(--md-elevation-2); }
    .elevation-4 { box-shadow: var(--md-elevation-4); }
    .elevation-8 { box-shadow: var(--md-elevation-8); }

    /* ===== RIPPLE EFFECT ===== */
    .ripple {
      position: relative;
      overflow: hidden;
    }
    .ripple::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      border-radius: 50%;
      background: var(--md-ripple);
      transform: translate(-50%, -50%);
      opacity: 0;
    }
    .ripple:active::after {
      width: 300px; height: 300px;
      opacity: 1;
      transition: width 0s, height 0s, opacity 0s;
    }
    .ripple:not(:active)::after {
      transition: width 0.4s ease, height 0.4s ease, opacity 0.6s ease;
    }

    /* ===== HEADER (App Bar — Flexy style, no shadow) ===== */
    .header {
      background: var(--md-header-bg);
      padding: 0 1.25rem;
      height: 4.375rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--md-divider);
      flex-shrink: 0;
      z-index: 10;
      transition: var(--theme-transition);
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .header-logo {
      width: 2rem; height: 2rem;
      background: var(--md-primary);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: var(--md-on-primary);
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--md-on-surface);
      letter-spacing: 0.01em;
    }
    .header-right { display: flex; align-items: center; gap: 0.75rem; }
    .header .status {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--md-success);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .header .status::before {
      content: '';
      width: 8px; height: 8px;
      background: var(--md-success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Theme toggle button */
    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--md-on-surface-medium);
      width: 2.5rem; height: 2.5rem;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background-color 0.2s, color 0.2s;
      font-size: 1.25rem;
    }
    .theme-toggle:hover {
      background: var(--md-hover);
      color: var(--md-on-surface);
    }
    .theme-toggle .material-icons-round { font-size: 1.25rem; }

    /* ===== MAIN CONTENT ===== */
    .main { flex: 1; overflow-y: auto; background: var(--md-surface); }
    #claude-content { padding: 1.5rem 2rem 2rem; min-height: 100%; max-width: 960px; margin: 0 auto; }

    /* ===== INDICATOR BAR ===== */
    .indicator-bar {
      background: var(--md-surface-1);
      border-top: 1px solid var(--md-divider);
      padding: 0.625rem 1.5rem;
      flex-shrink: 0;
      text-align: center;
      transition: var(--theme-transition);
    }
    .indicator-bar span {
      font-size: 0.8125rem;
      font-weight: 400;
      color: var(--md-on-surface-medium);
      letter-spacing: 0.01em;
    }
    .indicator-bar .selected-text {
      color: var(--md-primary);
      font-weight: 500;
    }

    /* ===== TYPOGRAPHY (Flexy type scale — DM Sans) ===== */
    h2 {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 0em;
      margin-bottom: 0.5rem;
      color: var(--md-on-surface);
    }
    h3 {
      font-size: 1.125rem;
      font-weight: 500;
      letter-spacing: 0em;
      margin-bottom: 0.25rem;
      color: var(--md-on-surface);
    }
    .subtitle {
      color: var(--md-on-surface-medium);
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      margin-bottom: 1.5rem;
    }
    .section { margin-bottom: 2rem; }
    .label {
      font-size: 0.6875rem;
      color: var(--md-on-surface-medium);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    /* ===== OPTIONS (Flexy cards for A/B/C choices) ===== */
    .options { display: flex; flex-direction: column; gap: 0.75rem; }
    .option {
      background: var(--md-surface-1);
      border: 1.5px solid var(--md-outline);
      border-radius: 20px;
      padding: 1.25rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }
    .option:hover {
      background: var(--md-hover);
      box-shadow: var(--md-elevation-1);
    }
    .option.selected {
      background: var(--md-selected);
      border-color: var(--md-selected-border);
      box-shadow: var(--md-elevation-2);
    }
    .option .letter {
      background: var(--md-primary-light);
      color: var(--md-primary);
      width: 2.25rem; height: 2.25rem;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.875rem; flex-shrink: 0;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .option.selected .letter {
      background: var(--md-primary);
      color: var(--md-on-primary);
    }
    .option .content { flex: 1; }
    .option .content h3 { font-size: 0.9375rem; font-weight: 500; margin-bottom: 0.125rem; }
    .option .content p { color: var(--md-on-surface-medium); font-size: 0.8125rem; margin: 0; line-height: 1.5; }

    /* ===== CARDS (Flexy cards for designs/mockups) ===== */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .card {
      background: var(--md-surface-1);
      border: 1px solid var(--md-outline);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--md-elevation-1);
    }
    .card:hover {
      box-shadow: var(--md-elevation-4);
      transform: translateY(-2px);
    }
    .card.selected {
      border-color: var(--md-selected-border);
      border-width: 2px;
      box-shadow: var(--md-elevation-4);
    }
    .card-image {
      background: var(--md-surface-4);
      aspect-ratio: 16/10;
      display: flex; align-items: center; justify-content: center;
    }
    .card-body { padding: 1.25rem 1.5rem; }
    .card-body h3 { font-size: 0.9375rem; font-weight: 500; margin-bottom: 0.25rem; }
    .card-body p { color: var(--md-on-surface-medium); font-size: 0.8125rem; }

    /* ===== MOCKUP CONTAINER ===== */
    .mockup {
      background: var(--md-surface-1);
      border: 1px solid var(--md-outline);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      box-shadow: var(--md-elevation-1);
      transition: var(--theme-transition);
    }
    .mockup-header {
      background: var(--md-surface-4);
      padding: 0.75rem 1.25rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--md-on-surface-medium);
      border-bottom: 1px solid var(--md-divider);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .mockup-body { padding: 1.5rem; }

    /* ===== SPLIT VIEW ===== */
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }

    /* ===== PROS/CONS (Flexy outlined cards) ===== */
    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    @media (max-width: 600px) { .pros-cons { grid-template-columns: 1fr; } }
    .pros, .cons {
      background: var(--md-surface-1);
      border-radius: 20px;
      padding: 1.25rem;
      border: 1px solid var(--md-outline);
      transition: var(--theme-transition);
    }
    .pros { border-left: 4px solid var(--md-success); }
    .cons { border-left: 4px solid var(--md-error); }
    .pros h4 { color: var(--md-success); font-size: 0.8125rem; font-weight: 500; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .cons h4 { color: var(--md-error); font-size: 0.8125rem; font-weight: 500; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .pros ul, .cons ul { margin-left: 1.25rem; font-size: 0.8125rem; color: var(--md-on-surface-medium); }
    .pros li, .cons li { margin-bottom: 0.35rem; }

    /* ===== PLACEHOLDER ===== */
    .placeholder {
      background: var(--md-surface-3);
      border: 2px dashed var(--md-outline);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      color: var(--md-on-surface-disabled);
      font-size: 0.875rem;
    }

    /* ===== MOCK UI ELEMENTS ===== */
    .mock-nav {
      background: var(--md-surface-2);
      border-bottom: 1px solid var(--md-divider);
      color: var(--md-on-surface);
      padding: 0.875rem 1.25rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      align-items: center;
    }
    .mock-nav a, .mock-nav span { color: var(--md-on-surface-medium); text-decoration: none; font-size: 0.8125rem; font-weight: 500; }
    .mock-nav a.active, .mock-nav span.active { color: var(--md-primary); }
    .mock-sidebar {
      background: var(--md-surface-1);
      padding: 1rem;
      min-width: 200px;
      border-right: 1px solid var(--md-divider);
    }
    .mock-content { padding: 1.5rem; flex: 1; }
    .mock-button {
      background: var(--md-primary);
      color: var(--md-on-primary);
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 7px;
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      text-transform: none;
      cursor: pointer;
      transition: box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s;
      box-shadow: none;
    }
    .mock-button:hover { box-shadow: var(--md-elevation-1); background: var(--md-primary-variant); }
    .mock-button:active { box-shadow: none; }
    .mock-input {
      background: var(--md-surface);
      border: 1.5px solid var(--md-outline);
      border-radius: 7px;
      padding: 0.75rem 1rem;
      width: 100%;
      color: var(--md-on-surface);
      font-family: 'DM Sans', Helvetica, Arial, sans-serif;
      font-size: 0.875rem;
      transition: border-color 0.2s;
    }
    .mock-input::placeholder { color: var(--md-on-surface-medium); opacity: 0.8; }
    .mock-input:focus { outline: none; border-color: var(--md-primary); border-width: 2px; }

    /* ===== PHASE BADGES (Flexy chip style) ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge-inception { background: var(--md-primary-light); color: var(--md-primary); }
    .badge-design { background: var(--md-secondary-light); color: var(--md-secondary); }
    .badge-build { background: var(--md-success-light); color: var(--md-success); }
    .badge-review { background: var(--md-warning-light); color: var(--md-warning); }

    /* ===== MERMAID DIAGRAM OVERRIDES ===== */
    .mermaid { background: transparent !important; }

    /* ===== SCROLLBAR (subtle Flexy-style) ===== */
    .main::-webkit-scrollbar { width: 8px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb {
      background: var(--md-surface-8);
      border-radius: 4px;
    }
    .main::-webkit-scrollbar-thumb:hover { background: var(--md-on-surface-disabled); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-logo">P</div>
      <h1>PDLC Visual Companion</h1>
    </div>
    <div class="header-right">
      <div class="status">Connected</div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme">
        <span class="material-icons-round" id="theme-icon">dark_mode</span>
      </button>
    </div>
  </div>

  <div class="main">
    <div id="claude-content">
      <!-- CONTENT -->
    </div>
  </div>

  <div class="indicator-bar">
    <span id="indicator-text">Click an option above, then return to the terminal</span>
  </div>

  <script>
    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      if (html.dataset.theme === 'dark') {
        html.dataset.theme = 'light';
        icon.textContent = 'dark_mode';
        localStorage.setItem('pdlc-theme', 'light');
      } else {
        html.dataset.theme = 'dark';
        icon.textContent = 'light_mode';
        localStorage.setItem('pdlc-theme', 'dark');
      }
    }
    // Restore saved theme
    (function() {
      var saved = localStorage.getItem('pdlc-theme');
      if (saved === 'dark') {
        document.documentElement.dataset.theme = 'dark';
        var icon = document.getElementById('theme-icon');
        if (icon) icon.textContent = 'light_mode';
      }
    })();
  </script>
</body>
</html>
