<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDLC Visual Companion</title>
  <style>
    /*
     * PDLC VISUAL COMPANION FRAME TEMPLATE
     *
     * This template provides a consistent frame with:
     * - Dark navy/blue PDLC-branded theming
     * - Fixed header and selection indicator bar
     * - Scrollable main content area
     * - CSS helpers for common UI patterns
     *
     * Content is injected via placeholder comment in #claude-content.
     */

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ===== THEME VARIABLES ===== */
    :root {
      /* PDLC dark navy/blue palette */
      --bg-primary: #0d1b2a;
      --bg-secondary: #132337;
      --bg-tertiary: #1e3550;
      --border: #2a4a6b;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-dim: rgba(59, 130, 246, 0.15);
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --selected-bg: rgba(59, 130, 246, 0.18);
      --selected-border: #3b82f6;
      /* Header gradient strip */
      --header-bg: #0a1628;
      --header-accent: #1d4ed8;
    }

    /* Light mode override — still respects OS preference */
    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #f0f4f8;
        --bg-secondary: #ffffff;
        --bg-tertiary: #dde6f0;
        --border: #b8cee3;
        --text-primary: #0f2040;
        --text-secondary: #4a6080;
        --text-tertiary: #7a95b0;
        --accent: #1d4ed8;
        --accent-hover: #2563eb;
        --accent-dim: rgba(29, 78, 216, 0.1);
        --selected-bg: rgba(29, 78, 216, 0.1);
        --selected-border: #1d4ed8;
        --header-bg: #0a1628;
        --header-accent: #1d4ed8;
      }
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      line-height: 1.5;
    }

    /* ===== FRAME STRUCTURE ===== */
    .header {
      background: var(--header-bg);
      padding: 0 1.5rem;
      height: 2.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--header-accent);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .header-logo {
      width: 20px; height: 20px;
      background: var(--accent);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800; color: white; letter-spacing: -0.05em;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #cbd5e1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .header .status {
      font-size: 0.7rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .header .status::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .main { flex: 1; overflow-y: auto; }
    #claude-content { padding: 2rem; min-height: 100%; }

    .indicator-bar {
      background: var(--header-bg);
      border-top: 1px solid var(--border);
      padding: 0.5rem 1.5rem;
      flex-shrink: 0;
      text-align: center;
    }
    .indicator-bar span {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .indicator-bar .selected-text {
      color: var(--accent-hover);
      font-weight: 600;
    }

    /* ===== TYPOGRAPHY ===== */
    h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; }
    .section { margin-bottom: 2rem; }
    .label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    /* ===== OPTIONS (for A/B/C choices) ===== */
    .options { display: flex; flex-direction: column; gap: 0.75rem; }
    .option {
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }
    .option:hover { border-color: var(--accent); background: var(--bg-tertiary); }
    .option.selected { background: var(--selected-bg); border-color: var(--selected-border); }
    .option .letter {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      width: 1.75rem; height: 1.75rem;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .option.selected .letter { background: var(--accent); color: white; border-color: var(--accent); }
    .option .content { flex: 1; }
    .option .content h3 { font-size: 0.95rem; margin-bottom: 0.15rem; }
    .option .content p { color: var(--text-secondary); font-size: 0.85rem; margin: 0; }

    /* ===== CARDS (for showing designs/mockups) ===== */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.15);
    }
    .card.selected { border-color: var(--selected-border); border-width: 2px; }
    .card-image {
      background: var(--bg-tertiary);
      aspect-ratio: 16/10;
      display: flex; align-items: center; justify-content: center;
    }
    .card-body { padding: 1rem; }
    .card-body h3 { margin-bottom: 0.25rem; }
    .card-body p { color: var(--text-secondary); font-size: 0.85rem; }

    /* ===== MOCKUP CONTAINER ===== */
    .mockup {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .mockup-header {
      background: var(--bg-tertiary);
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .mockup-body { padding: 1.5rem; }

    /* ===== SPLIT VIEW (side-by-side comparison) ===== */
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }

    /* ===== PROS/CONS ===== */
    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
    .pros, .cons { background: var(--bg-secondary); border-radius: 8px; padding: 1rem; }
    .pros { border-left: 3px solid var(--success); }
    .cons { border-left: 3px solid var(--error); }
    .pros h4 { color: var(--success); font-size: 0.85rem; margin-bottom: 0.5rem; }
    .cons h4 { color: var(--error); font-size: 0.85rem; margin-bottom: 0.5rem; }
    .pros ul, .cons ul { margin-left: 1.25rem; font-size: 0.85rem; color: var(--text-secondary); }
    .pros li, .cons li { margin-bottom: 0.25rem; }

    /* ===== PLACEHOLDER (for mockup areas) ===== */
    .placeholder {
      background: var(--bg-tertiary);
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.85rem;
    }

    /* ===== INLINE MOCKUP ELEMENTS ===== */
    .mock-nav {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.75rem 1rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.9rem;
      align-items: center;
    }
    .mock-nav a, .mock-nav span { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; }
    .mock-nav a.active, .mock-nav span.active { color: var(--accent-hover); font-weight: 500; }
    .mock-sidebar {
      background: var(--bg-tertiary);
      padding: 1rem;
      min-width: 180px;
      border-right: 1px solid var(--border);
    }
    .mock-content { padding: 1.5rem; flex: 1; }
    .mock-button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    .mock-button:hover { background: var(--accent-hover); }
    .mock-input {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      width: 100%;
      color: var(--text-primary);
      font-size: 0.9rem;
    }
    .mock-input:focus { outline: none; border-color: var(--accent); }

    /* ===== PHASE / STATUS BADGES ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-inception { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .badge-design { background: rgba(168,85,247,0.2); color: #c084fc; }
    .badge-build { background: rgba(34,197,94,0.2); color: #4ade80; }
    .badge-review { background: rgba(245,158,11,0.2); color: #fbbf24; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-logo">P</div>
      <h1>PDLC Visual Companion</h1>
    </div>
    <div class="status">Connected</div>
  </div>

  <div class="main">
    <div id="claude-content">
      <!-- CONTENT -->
    </div>
  </div>

  <div class="indicator-bar">
    <span id="indicator-text">Click an option above, then return to the terminal</span>
  </div>

</body>
</html>
